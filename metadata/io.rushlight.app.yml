AutoName: Rushlight

Summary: Offline AI navigation for censored and disaster regions

Description: |
  Rushlight is an offline-first navigation and survival tool built for
  activists, journalists, humanitarian workers, and anyone operating
  in connectivity-limited or censored environments.

  Features:
  * Offline maps and navigation (OpenStreetMap)
  * Local AI assistant (on-device LLM, no cloud required)
  * Offline Wikipedia reader (ZIM format via Kiwix)
  * P2P mesh data sharing (Bluetooth)
  * Morse code signaling (audio and flashlight)
  * Security features (stealth mode, duress PIN, encrypted storage)
  * Zero telemetry, no tracking, no cloud dependencies

  Built on OsmAnd with AGPLv3 license. All AI inference happens
  entirely on-device for maximum privacy and offline capability.


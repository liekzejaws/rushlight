name: Build debug apk

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: checkout OsmAnd
      uses: actions/checkout@v6
      with:
        path: android
    - name: checkout OsmAnd-resources
      uses: actions/checkout@v6
      with:
        repository: osmandapp/OsmAnd-resources
        path: resources
    - name: checkout OsmAnd-core
      uses: actions/checkout@v6
      with:
        repository: osmandapp/OsmAnd-core
        path: core
    - name: checkout OsmAnd-core-legacy
      uses: actions/checkout@v6
      with:
        repository: osmandapp/OsmAnd-core-legacy
        path: core-legacy
    - name: checkout OsmAnd-build
      uses: actions/checkout@v6
      with:
        repository: osmandapp/OsmAnd-build
        path: build
    - name: checkout OsmAnd-tools
      uses: actions/checkout@v6
      with:
        repository: osmandapp/OsmAnd-tools
        path: tools
    - name: checkout OsmAnd-misc
      uses: actions/checkout@v6
      with:
        repository: osmandapp/OsmAnd-misc
        path: misc

    - name: set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      working-directory: ./android
      run: chmod +x gradlew
    - name: Patch memory requirements
      working-directory: ./android
      run: printf "\norg.gradle.jvmargs=-Xmx2048m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8\n" >> gradle.properties
    - name: Patch OsmAnd-core compatibility
      working-directory: ./android
      run: |
        # MapRendererContext references Map3DObjectsTiledProvider whose constructor
        # signature changed in the upstream core AAR. Stub out the 3D provider call
        # since Legacy builds don't use 3D rendering.
        sed -i 's/map3DObjectsProvider = new Map3DObjectsTiledProvider(mapPrimitivesProvider, mapPresentationEnvironment);/map3DObjectsProvider = null; \/\/ CI: 3D objects disabled for legacy build/' \
          OsmAnd/src/net/osmand/core/android/MapRendererContext.java
    - name: Run unit tests
      working-directory: ./android
      run: ./gradlew testNightlyFreeLegacyArm64DebugUnitTest -x :OsmAnd-java:test
    - name: Build with Gradle
      working-directory: ./android
      run: ./gradlew assembleNightlyFreeLegacyArm64Debug -x :OsmAnd-java:test
    - name: Rename APK
      working-directory: ./android
      run: mv OsmAnd/build/outputs/apk/nightlyFreeLegacyArm64/debug/OsmAnd-nightlyFree-legacy-arm64-debug.apk OsmAnd/build/outputs/apk/nightlyFreeLegacyArm64/debug/Rushlight-debug-$(git log -n 1 --format='%h').apk
    - name: Archive APK
      uses: actions/upload-artifact@v7
      with:
        name: debug-apk
        path: android/OsmAnd/build/outputs/apk/*/*/*.apk
        retention-days: 90
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-results
        path: android/OsmAnd/build/test-results/
        retention-days: 30

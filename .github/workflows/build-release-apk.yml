name: Build release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: checkout OsmAnd
      uses: actions/checkout@v6
      with:
        path: android
    - name: checkout OsmAnd-resources
      uses: actions/checkout@v6
      with:
        repository: osmandapp/OsmAnd-resources
        path: resources
    - name: checkout OsmAnd-core
      uses: actions/checkout@v6
      with:
        repository: osmandapp/OsmAnd-core
        path: core
    - name: checkout OsmAnd-core-legacy
      uses: actions/checkout@v6
      with:
        repository: osmandapp/OsmAnd-core-legacy
        path: core-legacy
    - name: checkout OsmAnd-build
      uses: actions/checkout@v6
      with:
        repository: osmandapp/OsmAnd-build
        path: build
    - name: checkout OsmAnd-tools
      uses: actions/checkout@v6
      with:
        repository: osmandapp/OsmAnd-tools
        path: tools
    - name: checkout OsmAnd-misc
      uses: actions/checkout@v6
      with:
        repository: osmandapp/OsmAnd-misc
        path: misc

    - name: set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      working-directory: ./android
      run: chmod +x gradlew

    - name: Patch memory requirements
      working-directory: ./android
      run: printf "\norg.gradle.jvmargs=-Xmx2048m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8\n" >> gradle.properties

    - name: Decode release keystore
      if: env.RELEASE_KEYSTORE_BASE64 != ''
      env:
        RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      working-directory: ./android
      run: echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > release.keystore

    - name: Build release APK
      working-directory: ./android
      env:
        OSMAND_APK_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      run: ./gradlew assembleNightlyFreeLegacyFatRelease

    - name: Rename APK
      working-directory: ./android
      run: |
        VERSION_TAG="${GITHUB_REF#refs/tags/}"
        APK_DIR="OsmAnd/build/outputs/apk/nightlyFreeLegacyFat/release"
        for f in "$APK_DIR"/*.apk; do
          mv "$f" "$APK_DIR/Rushlight-${VERSION_TAG}.apk"
        done

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: android/OsmAnd/build/outputs/apk/*/*/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Archive APK
      uses: actions/upload-artifact@v6
      with:
        name: release-apk
        path: android/OsmAnd/build/outputs/apk/*/*/*.apk
        retention-days: 90
